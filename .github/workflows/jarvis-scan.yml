name: JARVIS Scan

on:
  schedule:
  
    # Run every hour at minute 0
    - cron: '0 * * * *'
  workflow_dispatch:
    # Manual trigger from GitHub Actions tab
    inputs:
      hours:
        description: 'Hours to scan back'
        required: false
        default: '2'

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout dashboard repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run JARVIS scan
        env:
          MS_GRAPH_CLIENT_ID: ${{ secrets.MS_GRAPH_CLIENT_ID }}
          MS_GRAPH_CLIENT_SECRET: ${{ secrets.MS_GRAPH_CLIENT_SECRET }}
          MS_GRAPH_TENANT_ID: ${{ secrets.MS_GRAPH_TENANT_ID }}
          DAVE_EMAIL: ${{ secrets.DAVE_EMAIL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          rm -f scripts/jarvis_seen.json
          HOURS="${{ github.event.inputs.hours || '2' }}"
          cd scripts && python jarvis_scan.py --hours $HOURS
          
      - name: Copy results to public data
        run: |
          mkdir -p public/data
          find . -name "jarvis_results.json" -not -path "./public/*" -not -path "./dist/*" -exec cp {} public/data/jarvis_results.json \;
          if [ ! -f public/data/jarvis_results.json ]; then
            echo "ERROR: No results file found anywhere"
            find . -name "*.json" -newer scripts/jarvis_scan.py | head -10
            exit 1
          fi
          echo "Results copied successfully"

      - name: Commit and push results
        run: |
          git config user.name "shivamamati"
          git config user.email "shivam.amati@gmail.com"
          git add public/data/jarvis_results.json
          git diff --staged --quiet || git commit -m "JARVIS scan $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
